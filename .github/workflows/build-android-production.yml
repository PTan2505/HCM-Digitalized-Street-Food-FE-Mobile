name: Android Customer Production Build

on:
  workflow_dispatch:
  push:
    branches: ['main']
    paths:
      - 'src/**'
      - 'components/**'
      - 'assets/**'
      - 'app.config.ts'
      - 'package.json'
      - 'eas.json'
      - 'android/**'
      - '!ios/**'
      - '!**/*.md'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 🏗 Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-cache: true
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        run: npm install

      - name: 🚀 Build Customer Android
        # We explicitly set APP_VARIANT here so app.config.ts picks the Customer Project ID
        run: eas build --platform android --profile customer:production --non-interactive
        env:
          APP_VARIANT: customer
