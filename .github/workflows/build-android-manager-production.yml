name: Android Manager Production Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # 🚀 April 2026: Force Node 24 to avoid the deprecation error you saw
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 🏗 Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: 🏗 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 🏗 Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-cache: true
          packager: bun # 👈 Crucial: Tells Expo to use Bun
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        run: bun install

      - name: 🚀 Build Manager Android
        # Explicitly passing the variant so app.config.ts switches IDs
        run: bun x eas-cli build --platform android --profile manager:production --non-interactive
        env:
          APP_VARIANT: manager
